<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f14" />
  <meta name="description" content="Poker Night — mobile-first house poker event management" />
  <title>Poker Night</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="app" class="app">
    <!-- Views are rendered dynamically by app.js into #view -->
    <section id="view" class="view" aria-live="polite"></section>
  </main>

  <nav id="tabbar" class="tabbar" aria-label="Primary">
    <button class="tab" data-tab="home" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 12 4l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1v-8.5Z"/></svg>
      <span>Home</span>
    </button>
    <button class="tab" data-tab="live" aria-label="Live Game">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a3 3 0 0 1 3 3v2h3a2 2 0 0 1 2 2v9a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V9a2 2 0 0 1 2-2h3V5a3 3 0 0 1 3-3Zm-1 5h2V5a1 1 0 0 0-2 0v2Z"/></svg>
      <span>Live</span>
    </button>
    <button class="tab" data-tab="history" aria-label="History">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9h-2a7 7 0 1 1-2.05-4.95L14 10h6V4l-2.35 2.35A8.97 8.97 0 0 0 12 3Zm1 5h-2v5l4 2 1-1.73L13 11.5V8Z"/></svg>
      <span>History</span>
    </button>
    <button class="tab" data-tab="leaderboard" aria-label="Leaderboard">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 4h4v16H4V4Zm6 6h4v10h-4V10Zm6-4h4v14h-4V6Z"/></svg>
      <span>Board</span>
    </button>
    <button class="tab" data-tab="profile" aria-label="Profile">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-4 0-8 2-8 6v1h16v-1c0-4-4-6-8-6Z"/></svg>
      <span>Profile</span>
    </button>
  </nav>

  <div id="sheet-root"></div>
  <div id="toast-root" aria-live="polite"></div>

  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
